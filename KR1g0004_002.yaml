front:
  text: 公是先生七經小傳卷中
  hash: sha256:db3d3b33b8e504dfd85db7335fcd873774d1da1f77d575deaefd99dbb1e102e0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1g0004_SBCK_002-1a}
body:
  text: 周禮大宰以八柄詔王馭羣臣三曰予以馭其幸幸者王所親幸也可賜予之不可爵之者也四曰置以馭其行置者耆老廢退之人雖當廢退其素行賢明特置之若公族穆子辭疾晉侯使掌公族大夫者也五曰生以馭其福福者其人本坐死以親故功貴者議而免之是其福矣楚誅鬪氏而免箴尹克黃改命曰生則此類也六曰奪以馭其貧奪者削其田邑禄賦七曰廢以馭其罪廢者除其名籍也八曰誅以馭其過誅者殺也過當作禍聲之誤耳有馭其福則有馭其禍矣福稱生則禍稱誅矣八柄者先叙賞而後言罰賞則先重罰則後重故誅最後言也康成謂誅爲齒路馬有誅之誅如此則八柄無死書曰用罪罰厥死義不可解又内史貳八柄爵禄廢置予奪生七者皆同而其一爲殺殺則誅也以九兩繫邦國之民一曰牧以地得民牧者司牧也謂邦國之君也諸侯丗故曰以地得民二曰長以貴得民三曰師以賢得民師者人師也師之得民與人君等四曰儒以道得民儒者藝術之稱儒之得民與人君等八曰友以任得民友者人友也友之得民與師儒等三者皆有得民之端故王者使民尊師貴儒而友賢三者皆得其義則王事成三者皆失其義則王事不成其所以繫邦國之民使民不離師則甚於宗友則甚於藪主以利得民主讀如觀近臣以其所爲主之主乃施典于邦國而建其牧立其監設其參傳其伍陳其殷置其輔牧亦司牧謂邦國之君也監者其冡嗣也春秋傳曰君行則守有守則從從曰撫軍守曰監國諸侯丗故立其監也所謂牧以地得民者也乃施則于都鄙而建其長立其兩設其伍陳其殷置其輔長者都鄙之君所謂長以貴得民者也不丗故不曰立其監宮正凡邦之事蹕宫中廟中則執燭凡邦之事蹕宫中者王有祭祀岀入之事宮正主爲王蹕于宫中矣蓋宮正所治蹕之者則隷僕也宫正主爲命之廟中則執燭者王祭于廟廟中不當蹕則宫正執燭焉康成讀凡邦之事蹕宮中廟中句則執燭若然則本但曰曰一作名凡邦之事宮中廟中則執燭無爲加蹕字也若宫正爲蹕則誰執燭乎按廟中不蹕無縁有蹕大府頒其貨于受藏之府頒其賄于受用之府貨者九貢九賦所入未用者賄者九式所用之餘以共玩好之用者受用之府其玉府與玉府凡王之獻金玉文織良貨賄之物受而藏之獻讀如大夫出疆必告反必有獻於君之獻傳曰頴考叔有獻於公是也大司徒以土冝之灋辨十有二土之名物以相民宅而知其利害以阜人民以蕃鳥獸以毓草木以任土事十有二土者即十二州也州各有冝如職方氏所掌耳周雖合十二州爲九州然本堯所分十二異冝故職方氏從時王之制以正其名而大司徒因上古之法以教民辨十有二壤之物而知其種以教稼穡樹蓻上言十二土者汎言十二異冝草木禽獸五榖冝種也此言十二壤者率一土復有此十二之別當知其種之所入即草人所掌糞種之法騂剛用牛赤緹用羊墳壤用麋渇澤用鹿鹹潟用貆勃壤用狐埴壚用豕彊㯺用蕡輕爂用犬凡九也又有青黎塗泥墳壚草人不掌者青黎塗泥可不必糞墳壚則從埴壚矣此所謂十二壤以土均之灋辨五物九等制天下之地征以作民職九等者即禹貢定天下之土田有上上上中上下中上中中中下下上下中下下也郷大夫職曰國中自七尺以及六十野自六尺以及六十有五皆征之其舎者國中貴者賢者能者服公事者老者疾者皆舎貴者自命士以上也賢者能者俊造學士也士工賈皆謂之國中牛人凡祭祀共其享牛求牛以授職人而芻之享牛享神之牛也求讀如逑逑配也配神者之牛以郊禮言之享牛所謂帝牛求牛所謂稷牛周書召誥用牲于郊牛二載師職曰以宅田士田賈田任近郊之地宅謂士之未仕者儀禮曰宅者在邦曰市井之臣在野曰草茅之臣孟子皆曰庶人庶人不傳贄爲臣不見君也鄭云宅謂致仕者非也士田者士當作工字誤耳工亦受田此是矣賈亦受田賈田是矣於近郊之地授處士之田授百工之田授啇賈之田三者皆居國中故授近地孟子曰國中什一使自賦下文云近郊什一義相發也凡言國中者皆指士工啇言野者皆農夫也郷大夫職云國中自七尺以及六十野自六尺以及六十有五皆征之此以國中者受田非其本職故早免之耳鄭云士田者士讀如仕仕者亦受田所謂圭田非也仕而受田者禄也圭田則其邑也非所以耕也審如鄭意仕且耕乎又載師徧序受田之名獨不及工工與賈等爾有賈田無工田是工惟不受田乎食貨志何以云工啇皆受田也此又鄭所自知者凡任地國宅無征園􅒡二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二惟其􅃮林之征二十而五國宅者謂國也宅也皆無征國者即上文􅒡里任國中之地者也宅者即上文宅田也􅒡田無征宅田無征其餘皆有征矣此但覆解上文自國至都征稅之差更無別少異而兩鄭俱不曉或謂是城中宅或謂是官宫室皆妄也又曰國宅無征以㕓里任國中之地㕓里者士民之里居工賈之市肆皆是也宅者以宅田工田賈田任近郊之地也工賈有征宅者無征云近郊十一者則孟子所云國中什一使自賦是也師氏保氏官也周公爲師召公爲保太師太保所謂三公者也康成合之非是調人凡和難父之讎辟諸海外兄弟之讎辟諸千里之外從父兄弟之讎不同國君之讎眡父師長之讎眡兄弟主友之讎眡從父兄弟此讎者蓋謂遇人不以禮而見殺者也以其不直故子弟雖欲讎之而調人推其本情不聽也遇人不以禮雖誠有罪殺之者亦專殺也故使辟焉以全子弟之心又曰勿辟則與之瑞節而以執之勿辟者則殺人不忌乃當正治其罪子展所以黜游氏之義也凡殺人有反殺者使邦國交讎之此謂吏以法殺人而死者之親敢報之者則邦國交讎之公羊傳曰父受誅子復讎推刃之道也凡殺人而義者不同國令勿讎讎之則死殺人而合於義爲隱謀禍惡之未發而能先事殺之若逋逃桀暴者朝士職曰凡盜賊軍郷邑及家人殺之無罪是此也遷其子孫使居異國又令勿讎司市國君過市則刑人赦夫人過市罰一幕丗子過市罰一帟命夫過市罰一蓋命婦過市罰一帷市者啇賈交利之地也君子無故不得觀焉設罰懲之深逺於利之意也國君則赦其刑人所赦者市刑也大刑扑罰中刑徇罰小刑憲罰自夫人以下則司市舉之使出此物焉婦人於市尤非其事故罰比男子差重也帟蓋皆在上帷幙以屏蔽異男女也言不及天子王后者尤非所冝亦罰不及至尊也遂人職曰上地夫一􅒡田百畮萊五十畮餘夫亦如之中地夫一􅒡田百畮萊百畮餘夫亦如之下地夫一􅒡田百畮萊二百畮餘夫亦如之亦如之者亦如其萊也餘夫未具夫婦未當受田如其萊而巳孟子曰圭田五十畝餘夫二十五畝旅師掌聚野之耡粟屋粟閒粟旅讀如葆旅之旅野生曰旅此官主野事故以旅爲號大宗伯以肆獻祼享先王以饋食享先王此兩者正謂禘也祫也禘禮以祼爲重祫禮以饋食爲重禴祠烝嘗雖皆有祼饋之事恐其節文略殊非禘祫之禮比也古禮旣亡不可知之孔子曰禘自旣灌而往者吾不欲觀之矣明禘禮以灌爲重肆猶旅也禘禮及毀廟故旅獻時見曰㑹殷見曰同時見者同時而見殷見者見於方岳之下時見則周官所謂六年五服一朝者也殷見則又六年王乃時巡考制度于方岳者也謂之同盟者蓋諸侯於是齊盟所謂同盟矣以天産作隂德以中禮防之以地産作陽德以和樂防之産生也作爲也人所受於天以生者謂之天産所受於地以生者謂之地産受於天以生者貌言視聽思本稟於五行内以爲性外以爲教者也不防以中禮則失謂之隂者以其受之天天道黙定也謂之德者教之所以起也受於地以生者剛柔緩急輕重仁武本稟於山川内以爲情外以爲形者也不防以和樂則過謂之陽者以其受之地地體顯著也王大封則先告后土后土社也王封諸侯取太社之土苞之以白茅而授之爲其將取是土故大宗伯先告焉敬其事也司尊彛凡鬱齊獻酌獻讀如獻莫重於祼之獻鬱齊惟祼用之於獻最重故曰獻酌也典瑞曰祼圭有瓉以肆先王以祼賔客肆猶旅也大祭旅獻也宗伯職曰以肆獻祼享先王謂大禘時雝禘之篇曰相予肆祀書曰肆類于上帝皆同義大祝又有肆享之說在後大司樂凡樂圜鐘爲宫黃鐘爲角大簇爲徵姑洗爲羽靁鼔靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣圜鐘黃鐘者皆雲門之樂所用之均也六變者雲門之樂一終咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆岀可得而禮矣此咸池之樂蓋八變而終其聲之均則自函鐘以下九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣九㲈者㲈九變而一終書云簫韶九成鳳皇來儀是也其聲之均則自黃鐘以下鐘師掌奏九夏鄭賈諸儒皆以九夏爲頌詩之篇春秋傳稱金奏肆夏之三工歌文王之三夏云金奏文王云工歌則夏非頌篇明矣然則九夏乃有聲而無辭者也􅗺人掌三易以辨九􅗺之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環以辨吉凶予謂掌九􅗺之名而以辨吉凶則不可以巫爲􅗺矣改巫爲􅗺以凖太卜作龜之八命而爲說也彼自云八命爾以九巫况之不近也此乃前丗通於占者九人其遺法存於書可傳者也古者占􅗺之工通謂之巫更咸式目等皆其名也巫咸見於他書多矣易疑爲易易古陽字所謂巫陽也其他則未聞雖未聞不害其有也大祝凡大禋祀肆享祭示則執明水火而號祝大禋祀者祭天圜丘也肆享者宗廟大禘也祭示方澤也三者禮最大故特言之肆享爲禘可知矣大司馬以九畿之籍施邦國之政職九畿相距萬里過禹迹多矣又周書稱侯甸男采衛而止則蠻夷鎭蕃者未取之乎疑本但云又其外五百里曰蠻圻謂直王畿之南者五百里曰夷圻直王畿之東者五百里曰鎭圻直王畿之北者五百里曰蕃圻直王畿之西者此九畿相距爲七千里近合事理通於禹貢而約於周書矣所以分蠻夷之名者在南方曰蠻在東方曰夷狄或謂之鎭戎或謂之蕃與疑冩周禮者習言又其外故遂誤増之耳說者以謂不然胡不試以天下地形正之洛邑爲中其東出者不三千里至海矣其南出者至朱崖交趾五千餘里耳是乃古所謂日下北戸者矣越裳九譯不甚此矣周公所辭也豈大司馬能施政職哉又此以人歩爲里而里以投足爲計歩九畿之法考以日景而筭於土圭比之人歩迃直懸矣大約三分去二則五千里之折必萬五千里乃能足矣司勲凡有功者祭于大烝司勲詔之按烝常祀無言大者大烝其禘祫與文二年大事于太廟躋僖公者祫也而外傳謂之烝此其一隅矣凡頒賞地參之一食惟加田無國征予謂加田者凡家臣邑宰之田國語曰官宰食加然則古以官宰之田謂之加矣無國征者不征於國以其自有君也家臣之征當入於家陪臣之征當入於國諸侯之征當入於王此其分也禮夫圭田無征大夫之田謂之圭田夫圭田亦自受田而不征於國征之爲倍征故曰以厚賢也隷僕掌五寢之埽除糞洒之事五寢者夫人以下所居也王后所居謂之正内隷僕不掌蓋自有寺人内竪云祭祀脩寢者脩讀爲滌祭祀則齊齊則大滌五寢使人㳙㓗不犯禁也謂之滌者其名也大喪復于大寢小寢者大寢内寢小寢燕寢正内也春秋莊公薨于路寢僖公薨于小寢鄭玄云五寢爲五廟之寢玄本謂天子五廟故云爾非正也又隷僕乃掌洗乗石蹕宫中之事古者人神不參若典職宗廟何縁䙝之於宫中而外役乎掌囚凡囚者上罪梏拲而桎中罪桎梏下罪梏梏者校也在頸曰梏春秋傳曰以弓梏華弱於朝謂之梏者以其在首猶牛馬㸵爾萍氏謂之萍者此職掌幾酒神農書曰萍能勝酒欲其制之也大行人時聘以結諸侯之好殷覜以除邦國之慝此與間問等皆王使臣於諸侯之禮也時聘以時聘諸侯五服各有時也殷覜者遍問天下諸侯也於下七歳徧覜諸侯是也故曰以除邦國之慝注以聘覜爲諸侯見王非也蓋惑於大宗伯文無閒問等而但言聘覜所以亂之也考工記曰國有六職百工與居一焉六職者坐而論道一職也作而行之二也審曲靣勢三也通四方之珍異四也飭力以長地材五也治絲麻六也此文首尾自明不須横以六官說之梓人爲飲器勺一升爵一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣食一豆肉飲一豆酒中人之食也一獻而三酬者獻以一升酬以三升也并而計之爲四升四升爲豆豆雖非飲器其計數則然匠人營國方九里以爲天子之居太狹亂於上公又詩云上入執宫功言郷井之民至冬皆當入保城也井田之制城中之宅率一家二畝半計地筭居九里之城不能容七萬五千家然則周禮所說乃天子中城也春秋曰城中城以諸侯之有中城亦知天子之有中城也匠人又云宫隅之制宫隅則天子宫也城隅則中城也中城方九里則宫城冝方三里中城有左祖右社九卿之室則百官治事之所也民居不至焉則限親䟽也其外城蓋經傳無文公羊說以爲千雉雉長二百尺凡方三十餘里則足相容儀禮士冠禮若不醴則醮用酒醴謂三加畢以醴酒飲冠者于客位者也不醴而醮謂庶子矣醴重醮輕曽子問除喪不改冠乎孔子曰天子賜諸侯服有冠醮無冠醴醴爲重也又昏禮適婦醴之庶婦醮之丈夫之冠猶婦人之嫁則醮用酒者必庶子也下文曰庶子冠于房外南靣遂醮焉是矣又曰孤子醴於阼知凡嫡子皆醴也鄭注云若不醴謂國有舊俗可行聖人用焉又注醮於客位云夏殷禮也皆非也夏殷有天下千餘歳冠禮行之乆矣設以醮爲禮者溥天之下皆醮也周公何以改之然則醮於客位當曰醴於客位嫡子冠於阼醴於客位以變爲敬也庶子冠與醮相因不於阼亦不於客位居房外南靣略庶子也醮禮繁醴禮簡以簡爲貴也醮三舉醴一辭以少爲貴也醮用酒醴用醴以質爲貴也醮有折俎醴脯醢而巳不尚味也酒在房外醴在房中以變爲敬也此皆聖人分別嫡庶異其儀也郷射禮曰郷侯上个五㝷中十尺上个者最上幅也中者最中幅也又曰侯道五十弓弓二寸以爲侯中此說中幅所以用十尺者取之侯道者也又曰倍中以爲躬倍躬以爲左右舌此說躬與舌各一幅也又曰下舌半上舌此說上下皆躬舌也侯中一幅上二幅下二幅幅各闊二尺則與侯中方矣梓人職所謂廣與崇方者也先量侯道乃制侯中旣制侯中乃定躬舌旣定躬舌乃因侯中之廣而求其崇必方其足凡五十弓之侯其中十尺其布五幅躬舌各一幅也七十弓之侯其中丈四尺其布七幅躬各二幅舌各一幅也九十弓之侯其中丈八尺其布九幅躬與舌各二幅也其崇則中十尺崇亦十尺矣中丈四尺崇亦丈四尺矣中丈八尺崇亦丈八尺矣謂之中者正以其居中也中者對上之言也有上有中則有下矣九十弓之侯布九幅以五爲中七十弓之侯布七幅以四爲中五十弓之侯布五幅以三爲中矣大射儀曰大侯之崇見鵠於參參見鵠於干干不及地武此髙下之節也大侯崇丈八尺棲鵠於其中從逺視之令岀於參之右舌下也所以必出於舌下者舌能蔽之故以見爲節也干侯之鵠則去地武武三尺也丗言歩武歩六尺則武三尺武者迹之也兩迹之閒則三尺武以是名之干侯之鵠用此爲髙亦幾中矣其設之次大侯在東參次之干次之使密不至相掩踈足以射其勢參差相入是謂貍歩鄭云中猶身也身之外復有躬舌躬舌身三者異者則五十弓之侯其崇丈八尺七十弓之侯其崇二丈二尺九十弓之侯其崇二丈六尺旣難卷舒矣至其設之又令參侯去地一丈五寸少半寸計其上綱則三丈二尺五寸少半寸也大侯去地二丈二尺五寸少半寸計其上綱則四丈八尺五寸少半寸也此之難信不俟言矣鄭意以謂不若是則大侯之鵠不見於參參不見於干然雖如鄭說求之大侯之鵠終不能見於參參亦終不能見於干也胡不嘗試以勾股求之人去干五十歩干去參二十歩干髙一丈九尺二寸令人目髙七尺從干望參計參侯之鵠去地二丈四尺五分寸之四乃能見之今鄭所說參侯之鵠去地一丈九尺二寸髙則髙矣欲使鵠裁見不足二寸如使鵠盡見不足四尺八寸五分寸之四從參視大侯亦然然則非也且鄭意謂三侯重張當使後侯髙前侯耳是與經不合經令獲者執旌各負其侯執旌者欲使射者視之審也如令大侯在參之背參在干之背其去地皆數十尺雖執旌安得而負之而射者亦安得而覩之哉又經云貍歩張三侯者非謂射者之志謂張之者之法也而鄭以謂射當如貍之擬物何預於張侯乎且鄭不獨誤於此經曰士旅酌若命復射則不獻庶子司射命射惟欲卿大夫皆降再拜稽首公答拜一發中三侯皆獲是言值一中侯輙釋獲耳而鄭以謂矢揚觸而有參中者是又失之也亦惑矣哉喪服無服之殤以日易月以日易月者假令長子也其本服三年以日易月則殤之二十五日餘子也其本服朞以日易月則殤之十三日少牢饋食曰日用丁巳又曰來日丁亥此皆取於丁者也所以取於丁者以先庚三日後甲三日所謂内事用柔日也凡祭祀卜日不卜辰故郊卜辛社卜甲宗廟卜丁也若卜辰則此旬之辰後旬或有不備矣康成注丁巳乃云來月之巳注丁亥乃云苟有亥焉可也皆失禮意禮記曲禮曰疑事母質直而勿有若夫坐如尸立如齊若夫說者以爲若丈夫此僻而不辭予按曽子曰孝子惟巧變故父母安之若夫坐如尸立如齊弗信不言言必齊色此成人之善者也未得爲人子之道也此兩若夫之文同疑曲禮本取曽子之言而誤留若夫不然則當云若夫坐如尸立如齊弗信不言言必齊色此成人之善者也而全脫一簡失弗信以下一十五字太上貴德其次務施報太上者致極之稱猶言大備全德之人也全德之人自得而巳奪之不以爲損予之不以爲益愛之不自以爲仁利之不自以爲義所謂不知有之者也其次奪之知損予之知益愛之爲仁利之爲義所謂親之譽之者也故施則必報是以不可無禮也自禮記左氏老子凡所言太上者皆若此繫其人不繫其時執玉其有藉者則裼無藉者則襲此直謂朝聘時耳圭璋璧琮琥璜皆玉也執璧琮琥璜則與帛錦繡黼同升所謂有藉有藉則裼禓者禮差輕尚文也執圭璋則特逹所謂無藉無藉則襲襲者禮方敬尚質也裼襲繫於有藉無藉不繫於有繅無繅又繅非藉藉非繅藉者薦也繅者組也禮之質文以圭璋琥璜爲輕重而不在一尺之組屈伸也言謚曰類類當爲誄聲誤爾謂誄而謚之也檀弓曰聖人之葬人與人之葬聖人也子何觀焉與語助辭復盡愛之道也有禱祠之心焉禱祠猶願幸耳史記曰此禱祠而求也人喜則斯陶陶斯咏咏斯猶猶斯舞舞斯愠愠斯戚戚斯歎歎斯辟辟斯踴按人舞冝樂不冝更愠又不當漸至辟踴此中閒有遺文矣蓋本曰人喜則斯陶陶斯咏咏斯猶猶斯舞舞斯蹈矣人悲則斯愠愠憤不足愠斯戚戚斯歎歎斯辟辟斯踴矣自喜而下五變而至蹈自悲而下亦五變而至踴所謂孺子慕者也般爾以人母嘗巧嘗試也則豈不得以其母以嘗巧者乎母當作母字誤以恕責之則病者乎殷人作誓而民始畔周人作㑹而民始疑誓㑹皆當出於天子爾殷旣衰諸侯專誓周旣衰諸侯專盟王制曰千里之内曰甸千里之外曰采曰流此據綏服居中而言内千里外千里則五服可知采亦當作蔡聲誤也關譏而不征謂覉旅士民也至於啇猶征之五十養於郷六十養於國七十養於學養於郷者郷飲酒之禮五十者始預於養也六十養於國者有命賙餼老者則及之矣養於學者則君就行焉文王丗子周人立四代之學者此直謂一處並建四學耳周人辟雍則辟雍最居中其北爲有虞氏之學其東爲夏后氏之學其西爲啇人之學當學羽籥干戈者就東序學禮者就瞽宗學書者就虞庠辟雍惟天子養老及岀師成謀與受俘大射等就焉當天子至於辟雍則三學之人環水而觀矣周人又以有虞氏之庠建之於郷故郷有庠以夏后氏之序建之於州故州有序以啇人之校建之於黨故黨有校自黨以下皆爲小學而非四代之制以教童子而巳擇小學之秀者移之校擇校之秀者移之序擇序之秀者移之庠擇庠之秀者移之太學太學在郊以其包四代之制故記禮者或有指虞庠名之或有指東序名之所以紛紛如此之多者所指之體偏也凡釋奠者必有合也有國故則否合謂合樂也春釋采合舞秋頒學合聲釋奠則并合之以侑神也有國故者謂凶禮師旅也惟是不合郊特牲曰凡飲養陽氣也凡食養隂氣也故春禘而秋嘗春饗孤子秋食耆老其義一也而食嘗無樂此五字衍玉藻曰大夫私事使私人擯則稱名鄭云若晉侯使韓穿來言汶陽之田歸之于齊之類非也此乃謂若趙襄子使楚隆弔吴夫差之類爾凡大夫聘而傳命則當稱寡君至於私臣擯於君命不得言主故名之也楚隆之詞曰寡君之老無䘏使陪臣隆敢展謝之此則名者也喪服小記曰禮不王不禘此一句當在前文王者禘其祖之所自岀之上脫誤在後爾又曰庶子王亦如之注示庶子祭天立廟非也此一句當承後文慈母與妾母不丗祭也之下脫誤在前耳又曰而立四廟云天子立四廟亦非也此一句上有脫簡耳文當曰諸侯及其太祖而立四廟學記曰發慮憲求善良足以謏聞不足以動衆發慮憲者言發動智慮能求憲法也動讀如中庸明則動之動言此皆從善未足以動人也就賢體逺足以動衆未足以化民賢謂賢於人之賢逺謂逺於人之逺可以動人矣未能使人化也凡動者言矜式之化者言心服之惟學可以化民成俗謂其所傳者博所教者衆見之者詳也樂記曰知音而不知樂者衆庶是也惟君子爲能知樂所謂君子知樂者知其通倫理也知其扶性飾情而反之正也知其創業象功移風俗也清廟之瑟朱弦而䟽越一倡而三歎有遺音者矣大饗之禮尚玄酒而俎腥魚大羮不和有遺味者矣此皆言貴其本而忘其末也遺者忘也棄也清廟之瑟美其德而忘其音大饗之禮美其敬而忘其味凡樂以音爲之節而反忘音焉意不主於音也意不主於音是故朱弦䟽越乃可尚也凡食饗以味爲之文而反忘味焉意不主於味也意不主於味是故元酒大羮乃可尚也主於音則不能遺音不能遺音則雖繁手淫聲有不足矣主於味則不能遺味不能遺味則雖太牢庶羞有不足矣故孔子曰禮樂云散軍而郊射左射貍首右射騶虞郊射者射於郊也大射三侯北靣東上故貍首爲左騶虞爲右矣曲禮曰主人入門而右雜記曰大夫訃於他國之大夫曰吾子之外私寡大夫某不禄使某實實者以異國傳聞疑言使人實之也襃衣襃衣者加賜之衣在數之外者也違諸侯之大夫不反服違大夫之諸侯不反服此言違而仕者則不反服舊君避新君也然而違而未仕者聞舊君之喪則反服爾春秋傳所謂未臣焉有伐其國者反死之可矣旣臣焉而反死之則不可鄭玄云去諸侯仕諸侯去大夫仕大夫乃得爲舊君服非也父母之喪將祭而昆弟死旣殯而祭如同宫則雖臣妾葬而後祭按喪不冝有異居然則昆當作兄兄弟或不同居矣喪服曰小功以下爲兄弟喪大記曰復衣不以衣尸不以斂此兩句共一說耳於文爲駢然則本但云復衣以衣尸不以斂也以衣尸者即士喪禮以衣衣尸者也不以斂者即士喪禮浴而去之者也祭義曰周人祭日以朝及闇此言周人尚赤大事用日岀先日欲出之初猶逮及闇則可行祭事矣稍後則晝晝則與殷人日中相亂故季氏祭仲由爲宰晏朝而退仲尼謂之知禮也若曰周人之祭自朝及暮則孔子無爲多仲由仲由爲不知禮中庸曰故君子以人治人改而止言廻已而作人如是而巳矣此所謂恕也表記子曰君子不失足於人不失色於人不失口於人足者足恭也色者令色也口巧言也此仲尼所與左丘明同其恥之三事也故下自解之曰君子貌足畏也色足憚也言足信也信則不巧矣憚則不令矣畏則不足矣注乃云足容色容口容非也子曰惟天子受命于天士受命于君注者曰惟當作雖非也此言天子之命在天士之命在君非天命不爲天子非君命不爲士也皆有制之巳射義曰諸侯以貍首爲節鄭玄以射儀所引曽孫侯氏爲貍首之詩非也騶虞采蘋采蘩皆在二南則貍首者亦必其儔矣疑原壤所歌貍首之斑然執女手之卷然即是其章首但仲尼刪詩之時樂正巳亡此篇而諸侯朝覲之禮乆絶惡貍首之害已又皆除其籍故使不在二南也或曰貍首鵲巢也篆文貍似鵲首似巢鵲巢之詩御之將之成之此亦時㑹之道公羊國語公羊傳桓公二年宋督弑其君下注全衍莊九年齊人取子糾殺之其何當云其曰取之何十六年公㑹諸侯同盟于幽衍公字二十六年公伐戎少一春字閔公篇當附莊公後僖十八年宋公㑹曹伯伐齊衍㑹字文十三年衛侯㑹公于沓少公字成二年齊侯使國佐如師已酉及國佐盟于袁婁後又云及齊國佐盟于袁婁前文全衍後文衍齊字十五年執曹伯歸之于京師衍之字襄二十四年大饑誤爲譏字今本巳作饑三十一年莒人弑其君密州下注衍密州爲君惡已下十四字昭元年衛石惡當作衛齊惡二十年華定出本陳本當作奔字今本已作奔哀七年若使他人然當云使若他人然左傳曰都城過百雉國之害也說者曰百雉之城三國之一也据子男而言也又曰大都不過三國之一中五之一小九之一然則設鄭伯建小都才方一百七十餘歩豈有半里之地可爲都者又其中大計不過五百畝之田耳城郭涂巷三分去一則僅得三百四十畝如何建宗廟社稷如何居民如何守禦此不近人情之尤者公羊云五板而堵五堵而雉是也國語曰禘郊宗祖報報似有壇墠而無廟者或曰報者毀廟之有功德者祫則亦及之故云報也公是先生七經小傳卷中
