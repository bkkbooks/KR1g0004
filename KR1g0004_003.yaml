front:
  text: 公是先生七經小傳卷下
  hash: sha256:385a03a75cf741f959e77f4e7c7af6b595a930e0842e55162cc21025a0951229
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1g0004_SBCK_003-1a}
body:
  text: 論語學而時習之不亦說乎温故而知新有朋自逺方來不亦樂乎朋衆也可以爲師而衆歸之人不知而不愠不亦君子乎不患人之不己知曽子曰吾日三省吾身爲人謀而不忠乎與朋友交而不信乎傳不習乎傳者傳所受於師之道今無乃不習而以教人乎爲誤人爾禮之用和爲貴君所謂可而有否焉君所謂否而有可焉此之謂和先王之道斯爲美小大由之有所不行大君臣也小父子也有所不行者在醜夷不爭之類是知和而和不以禮節之亦不可行也此復說有所不行也獻可替否和也在醜夷不爭禮也但知貴和爲和而不知禮有常節者亦不可行也故臣亦有三諌而去之道若三諌而不去是又不以禮節者也信近於義言可復也恭近於禮逺恥辱也因不失其親亦可宗也親近也信者恭者雖未合於義禮苟能因其性而不失所近人亦可尊此欲信者常務近義恭者常務近禮皆可宗也林放問禮之本子曰大哉問禮與其奢也寧儉喪與其易也寧戚夫以戚爲喪本可也以儉爲禮本何哉曰林放本問賔客奉養之禮非兼問五禮也何以明之問五禮之本則不當答以儉又不當引喪爲之偶故知所問惟賔客奉養之禮也賔客奉養之禮以儉爲本者儉則任誠慤誠慤乃本也故聘禮曰幣美則没禮又曰多貨則傷德幣之與貨非所以爲本也損其美却其多乃可謂之儉儉則禮與德俱無傷是本矣孟子曰恭敬者幣之未將然則禮之字當讀如厚爲之禮之禮子曰射不主皮此大射禮篇文也爲于僞反力不同科古之道也解禮所以如此云者爲力不同科也是以君子貴德賤力取其有威儀也儀封人曰二三子何患於喪乎喪讀如問喪之喪喪欲速貧之喪失位爲喪是時仲尼去大夫故云喪也言喪不足患是乃天下乆無道而天以夫子爲木鐸於其閒耳故使之數失位周流也子曰里仁爲美擇不處仁焉得知里猶居也言人爲身謀居惟居於仁爲美即擇居而不能居仁不可謂知仁者安仁知者利仁仁者生而靜其爲仁安之而巳矣知者動而復者也動而復則利而後仁利者非利於爲仁之可以得利也利猶動也智者必動而後仁矣惟仁者能好人能惡人以其無好惡故能定好惡子曰苟志於仁矣無惡也此言人之行事苟能推心於仁以善爲之雖不中節終不爲惡謂之過可矣子曰我未見好仁者惡不仁者好仁者無以尚之惡不仁者其爲仁矣不使不仁者加乎其身所謂好仁者安仁者也惡不仁者去不仁而就仁者也去不仁而就仁則是不欲使已有不仁之過也雖不能及安仁者亦可謂仁矣子曰人之過也各於其黨觀過斯知仁矣此言君子有過小人亦有過但各自附近爲黨類耳欲分別之者小人之過常近利君子之過常近善舉其過而推言之則知仁不仁之情譬如陳司敗問昭公知禮乎孔子曰知禮此實過也然仲尼之意非不知過蓋欲厚其君不得不受以爲過也周公使管叔監殷管叔以殷畔此實過也蓋欲親其兄不得不受以爲過也推孔子之厚其君周公之親其兄則其過也乃所以全其仁也又曰人之過或有以善爲之而不知其義者故當徴黨類以察其素行是非子曰朝聞道夕死可矣道仁也所以未可死者以不聞道也苟聞夫道朝聞之則夕死也可夕聞之則朝死也可非樂死也非求死也安死也安死者惟簡之而不得君子懷德小人懷土君子在上位者也言君子懷於爲德導之以德則小人乃懷土重遷如君子懷於用刑導之以政則小人不復懷土將懷惠已者而歸之矣所謂免而無恥也此言小人之性無常在上導之而已子曰不患無位患所以立不患莫己知求爲可知也求知非也求爲可知是也知之者人也莫知者已也子曰道不行乗桴浮於海從我者其由與子路聞之喜此一章意若仲尼眞欲浮于海是懟也非君子之道矣且又不當譏子路無所取材也夫譏子路無所取材則足以明浮于海非仲尼意浮于海非仲尼意而仲尼爲若言者蓋言已在天下道不行則去周流四方若乗桴之浮海隨波轉薄矣子路失指謂仲尼眞欲浮于海故仲尼反以無所取材戲之也宰予晝寢子曰朽木不可彫也云云學者多疑宰予之過輕而仲尼貶之重此弗深考之蔽也古者君子不晝夜居於内晝居於内則問其疾所以異男女之節厲人倫也如使宰予廢法縱欲晝夜居於内所謂亂男女之節俾晝作夜大雅之刺幽厲是也仲尼安得不深貶之然則寢當讀爲内寢之寢而說者蓋誤爲眠寢之寢子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也此言惟聖人能盡人之性盡物之性長短大小深淺天道者天命也聖人所獨知也堯授舜舜授禹是也子路有聞未之能行惟恐有聞予謂聞讀如聞斯行諸之聞行讀如聞斯行諸之行子路周人之急常若不迨此孔子所以戒其兼人也陳文子有馬十乗棄而違之凡大夫去其位曰違違猶喪也春秋傳曰卿違從大夫之位又曰凡諸侯之大夫違告于諸侯子曰十室之邑必有忠信如丘者焉聖人之忠信與人同耳故雖十室之邑必有之不如丘之好學者也人之忠信暫至而巳不如聖人好而學之不倦也此其所以異有顔回者好學三月不違仁是好之今也則亡未聞好學者也其餘則日月至焉而巳矣女爲君子儒無爲小人儒君子儒將行之所謂爲巳者也小人儒將言之所謂爲人者也質勝文則野質誠慤也文儀貌也由内出故曰質由外作故曰文野人不爲儀貌而多任誠慤文勝質則史史者祝史也習于儀貌而不任情實文質彬彬然後君子儀以飾情外内相副無所偏任人之生也直人所以取生者皆正直之道也若不由正直則死矣罔之生也幸而免有不由正直者名之爲罔言非人常生之道也然而得生者是幸也非必然樊遲問仁曰仁者先難而後獲可謂仁矣行之似迂闊望之似難成不求近功者也如是可謂仁難讀如爲之難之難難者踐迹也不難未有能獲者也子曰知者樂水仁者樂山知者動仁者靜知者樂仁者壽知者則利仁者也仁者則安仁者也利仁者明而誠之有似於水漸而進者故曰樂水也安仁者誠而明之有似於山自然而髙故曰樂山也凡明而誠之者本動故也故曰知者動凡誠而明之者本靜故也故曰仁者靜凡利仁者去不善而就善萬物皆備於我矣故曰樂凡安仁者與造化爲一體死生不得與之變故曰壽子曰齊一變至於魯魯一變至於道道王道也仲尼之時齊強魯弱然齊承霸者之餘其俗尚功名任權力不如魯人習禮讓守儒術尊尊親親於王道爲近子曰觚不觚觚哉觚哉此言作觚不依觚之制終不成爲觚猶學君子者不盡其道終不成爲君子也君子可逝也逝讀如逝將去汝之逝不可䧟也君子表微知著不善斯去矣可得而逝不可得而䧟可欺也可欺以其方不可罔也難罔以非道子見南子子路不說夫子矢之曰予所否者天厭之天厭之舊說仲尼見南子欲因以行道非也古者謂其君曰君謂其夫人曰小君仕者自當見小君是時孔子仕於衛故以禮見南子也子路疑衛君無道夫人無德夫子不足復仕其朝故孔子陳之曰予所不仕者皆棄絶於天者耳衛君尚未也或者子路爲衛君無道夫人無德疑夫子内貪仕其朝而外託於禮故夫子自陳其意曰我所不用正者使天厭之天厭之㝷子路性鄙不爲無此而仲尼自謂知我者其天乎援天陳辭亦不足怪子貢曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎博施者言其守約施博而衆皆濟在上則堯舜在下則孔子是巳天地之内性命之屬莫不兼而利之兼而愛之物無愚智無大小皆樂其性而得其生可謂濟衆矣惟聖人及之子曰黙而識之聖也學而不厭智也誨人不倦仁也何有於我哉自謙謂此三事何有於我者我何有此三事也子曰志於道據於德依於仁游於藝此言以道德爲内以仁藝爲外也志於道者所以立大本也據於德者所以盡其性也德者得也凡道苟能志之又必安於已之自得以爲據依於仁者所以接萬事也進退行止出處語黙不可常同要之仁而巳游於藝者所以行於丗也禮樂射御書數與衆人共之不可不爲也此所謂全德無内外之偏矣不圖爲樂之至於斯也不圖不意也仲尼昔未甞聞韶乍聞之樂甚故曰不意舜之爲樂乃至於如此也子不語怪力亂神語讀如吾語女之語人有挾怪而問者挾力而問者挾亂而問者挾神而問者皆不語之此聖人知言也怪讀如素隱行怪之怪詭采衆名非中庸之法者也力則子路問君子尚勇是矣亂者若孔文子問軍旅白公問微言是矣神者季路問鬼與死是矣文莫吾猶人也言丗多虚文過實莫肯自謂吾猶人也躬行君子則吾未之有得子曰㤗伯其可謂至德也巳矣三以天下讓民無得而稱焉所謂三以天下讓者言自竄荆吴以讓季歷也所以讓季歷者以季歷有昌也所以貴昌者以昌有發也太伯見季歷旣仁而文武又聖知天之意方大啓周室必有天下故黙焉而逃是太伯讓仁人者一讓聖人者二故曰三以天下讓也夫深知仁聖之德因見天命之運獨出獨入而百姓莫知者也故曰無得而稱焉辭一國之適離逃竄之名以自棄於蠻夷徃而不反求仁得仁者也故曰可謂至德矣子曰大哉堯之爲君也巍巍乎惟天爲大惟堯則之此正言堯之讓也天道功成者去爲而不恃堯始以天下讓故云惟堯則之武王曰予有亂臣十人孔子曰有婦人焉九人而巳舊說婦人即文母予謂子無臣母之理或云古文無臣字如此則不成文按武王即位巳八十餘未知文母猶存否以義推之此亂臣蓋邑姜必非文母也武王使九人者治外而邑姜治内故得以同之亂臣子罕言利與命與仁罕者希也希言利辟其號也希言命所謂天道不可得而聞也希言仁所謂中人以下不可以語上也旣非其人不言故問仁者或曰仁則吾弗知或曰未知焉得仁子絶四毋意毋必毋固毋我或當以四作二非也毋意者不逆詐不億不信也億則意也毋必者言不必信行不必果惟義所在也毋固者無可無不可也毋我者義陳於前直服人之口也子貢曰有美玉於斯韞匵而藏諸求善賈而沽諸此子貢設事以問孔子也言有美玉者當韞藏之邪求善賈沽之邪怪孔子有道不輙仕故云爾故孔子曰沽之哉沽之哉我待賈者也言玉亦貴沽之耳但當待價使人求之不可衒賣也故曰我待賈者也丗人皆干禄而孔子應聘此其操矣子欲居九夷蓋徐州莒魯之閒中國之夷非海外之夷也何以言之仲尼稱夷狄有君不如諸夏之亡則無縁忽欲去中國而從夷狄矣周末時蓋戎夷與中國雜居仲尼周流未嘗三年淹故其覉旅之際適偶可居九夷耳非忿懟中國莫能宗己而去之也子曰苗而不秀者有矣夫秀而不實者有矣夫此言人之學譬於未有苗而不及秀者秀而不及實者皆中道而畫惟君子苗則秀秀則實所謂大成之人也管子曰夫禾其始也眴眴乎何其孺子也其壯也莊莊乎何其士也其成也由由乎兹免何其君子也眴眴者苗也莊莊者秀也由由者實也終此論者秀與實在禾而食之在人耳子曰法語之言能無從乎改之爲貴巽與之言能無說乎繹之爲貴巽謂遜于志者也法語之言雖小人亦能面從改之難耳巽與之言雖君子不能不心恱繹之難耳啇書曰有言遜于汝志必求諸非道求也所謂繹也子曰可與共學未可與適道可與適道未可與立可與立未可與權此言權之難也共學也適道也立也權也四人也共學以况有恒者有恒者可與共學矣未及適道也適道以况善人善人升堂不入於室可與適道矣未及於立也立者言立德立功也立德立功者以况君子君子可與立矣未及於權也能用權者其惟仁聖而巳矣權者反經者也反經之至至於動天下易君王而當丗不疑後丗不非惟無心而體道者能之湯武伊尹周公是也故有湯武伊尹周公之心則可以行權無湯武伊尹周公之心則亂也曹人欲君子臧吴人欲君季札皆辭不從兩人者自知審矣以謂已適可以立而未可以權也權之設豈易然乎不時不食如果實未熟之類子曰先進於禮樂野人也後進於禮樂君子也如用之則吾從先進此言文質之異也凡誠慤爲質禮樂爲文人之舉事能先盡誠慤而後禮樂者今之所謂野人也野人猶言郊野之人郊野之人質多而文少務實而不務華其舉事先飾禮樂而後誠慤者今之所謂君子也君子謂朝廷之人習其文而忘其質仲尼欲救周之敝復夏之忠故取先進於禮樂者先進於禮樂者言誠慤在禮樂之先孟子曰恭敬者幣之未將者也子曰從我於陳蔡者皆不及門也德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏自德行以上孔子語也自德行而下則弟子縁仲尼之言而記之者也三千之徒足以升四科者不惟此十人此十人乃從我陳蔡者耳子張問善人之道子曰不踐迹亦不入於室此言善人資性未能髙絶苟不踐迹則亦不能入於室毎踐迹則可以入室矣迹者禮樂法制也然則有不待禮樂法制而未始入於非人者雖不踐迹而入室矣子曰論篤是與君子者乎色莊者乎與讀如黨與之與篤於論者而與之謂之君子乎謂之色莊乎蓋謂之君子矣莊言色厲内荏子路率爾而對率爾者意氣發動輕易之貌又曰夫子何哂由也曰爲國以禮其言不讓是故哂之不讓者言其不務德化而貴勇力以當師旅是爭也夫子喟然歎曰吾與點也按此章仲尼本但問如或知爾則何以哉今曽點所言非知爾之事也對不答問矣而仲尼反自謂與之者點之意以謂上苟知也固當以此知之也此乃所謂事無事爲無爲矣是易之不事王侯髙尚其事者也巢由知於堯舜故能全其讓夷齊知於武王故能全其隱四皓知於漢髙故能全其處然則不事其事者乃所以事也不爲其爲者乃所以爲也此全德之所能非曽點可及曽點進取者也夷考其行而不掩是以孟子謂之狂顔淵問仁子曰克己復禮爲仁克者勝也勝已而反於禮是爲仁此中道也上焉者不待於禮然而不得不爲禮下焉者不及於禮然而不敢不爲禮故雖有孔顔之質動而顧禮所以行於丗也雖有庸俗之質亦動而顧禮所以免於丗也二者皆克己乃可不然者極孔顔之質必過極庸俗之質必放矣死生有命賢不必壽不肖不必夭是命也冨貴在天無犯義以謀冨貴則冨貴乃在天而巳天者不可知之原子曰片言可以折獄者其由也與此言非佞折獄惟良折獄也子路信義著於人人服之所右也則信以爲右所左也則亦信以爲左兩俱無憾是能以片言折獄者也故曰千乗之國可使不信其盟而信子之言若由是推之片言折獄尚其小者也古者謂多言爲佞多言不可以折獄子路無宿諾宿舊也陳也子路勇於義其於人有所不諾巳諾之則必行故無宿諾也宿諾猶陳言矣夫逹也者質直而好義察言而觀色其言語可察其容貌可觀子夏爲莒父宰問政子曰無欲速無見小利欲速則不逹見小利則大事不成此言王者之功必緩且大也欲速者不任教化而任賞罰諸霸者之政刑名之學是也見小利者内欺其民以益財外欺其鄰以益地諸冨國強兵之術是也人而無恒不可以作巫醫巫醫皆主治人無恒之人不可爲之爲其反害人也况可以無恒爲政乎善夫不恒其德或承之羞子曰不占而巳矣据見無恒必當承之羞不必占而知之子貢問曰郷人皆好之何如子曰未可也郷人皆惡之何如子曰未可也不如郷人之善者好之其不善者惡之此言人當信已之信也子貢問郷人皆好之者言有人於此郷人皆好之可信以賢乎孔子曰未可者或郷原之人在邦必聞故也又問郷人皆惡之言者有人於此郷人皆惡之可信以不肖乎孔子曰未可者或清士特立愠于羣小故也不如以已觀郷人之行誠合於善者我因好之其不合於善者我亦惡之此之謂信已克伐怨欲不行焉可以爲仁矣子曰可以爲難矣仁則吾不知也此言仁者無克無伐無怨無欲者也非有之而不行有之而不行故可謂之難未可謂之仁難可以謂之近未可以謂之眞子曰剛毅木訥近仁剛則無欲者也問管仲曰人也人上當失一字仲尼必不直曰人而巳彼非人而管仲乃獨曰人乎不乃管仲外舉非人者是豈仲尼之意也或曰人當作仁亦非也管仲之功爲仁耳仁之道非管仲所盡仲尼亦不輕于之荀子謂之野人亦非也義不合子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎子貢曰管仲非仁者與桓公殺公子糾不能死又相之子路子貢皆以管仲不死疑其不仁然則仁者且必死耶丗言死君者莫如比干子胥比干剖心孔子謂之仁子胥鴟夷丗不謂之仁然則仁不必死死不必仁明矣子路子貢何爲止以死不死論仁不仁乎其意以謂仁者不樂生不惡死也而管仲可以死而不死故疑也夫謂仁者不樂生不惡死是也疑管仲死之爲仁非也管仲未仁雖死之固亦未仁管仲茍仁雖不死猶仁矣微子去之箕子爲之奴比干諌而死孔子曰殷有三仁焉此之謂也然則管仲功用之臣自實惜其死將以其功用施之於丗以成其仁功而巳孟子所謂天民者也子曰古之學者爲已今之學者爲人爲已者人知之亦樂之人不知亦樂之者也爲人者舎其田而芸人之田者也子曰作者七人矣七人所謂長沮桀溺丈人石門荷蕢儀封人楚狂接輿但取見於論語者此說非也辟丗辟地辟色辟言不止此七人七人與孔子同時耳必同時又有老聃子桑伯子非不能辟言色者予謂作讀如作者之謂聖之作仲尼叙書始堯舜堯舜以來始有典籍故道典籍以來聖人得位而制作者凡七人即堯也舜也禹也湯也文也武也周公也是矣其意蓋言己獨不得位而無所制作云爾此一章孤立偶與避丗章相屬學者不曉故遂穿鑿妄解一說七人者即伯夷叔齊虞仲夷逸朱張柳下惠少連者也伯夷叔齊不降其志不辱其身所謂辟丗柳下惠少連降志辱身言中倫行中慮所謂辟色也虞仲夷逸隱居放言所謂辟言也朱張無事迹其辟地者與衛靈公問陳於孔子孔子對曰俎豆之事則嘗聞之矣軍旅之事未之學也此亦不語亂也諸侯有朝㑹聘享祭祀燕射之禮而不得專征伐故曰俎豆之事則嘗聞之軍旅之事未之學也不斥言其不當問而自謂未之學所謂邦無道則愚子曰賜也汝以予爲多學而識之者與對曰然非與曰非也予一以貫之一以貫之者仁也惟仁爲能一惟一爲能貫仁者之用心也敦兮其若樸寂兮其若谷昭兮其若鑑萬物莫足以嬰其中萬物莫足以嬰其中則雖言而未嘗言雖爲而未嘗爲矣故終日言而一終日爲而一未嘗變而事物爲之應在上也可在下也可耕稼也可陶漁也可版築也可啇儈也可此皆外之變而非内之一也故誠守其一萬物備矣由是而一可以應萬而萬不可以應一故曰非多學而識之者多學在一之外故也丗之多學者衆矣鮮能定乎一得其末不得其本逐物而不反而丗因謂可以無學無學不害此原伯魯躓於前而老莊敝於後也子曰吾猶及史之闕文也丗亂史之記注不明前代之事有闕文者仲尼猶及知之至於編簡俱絶非仲尼所知也故春秋斷自隱公耕也餒在其中矣學也禄在其中矣耕者謀食而無以自樂常有餒乏之憂學者謀道而有以自足子曰水火吾見蹈而死者矣未見蹈仁而死者也此言蹈仁者未嘗死也未嘗死者非不死之謂也言其安之無死地也從此論之仁者必壽明矣朝聞道夕死可矣子曰當仁不讓於師此言當仁者冝爲人師當仁者可不復讓於人師當仁而讓於人師則道幾乎不傳此孟子所謂樂得英才而教育之然則才非當仁亦不可不讓爲人師危而不持顚而不扶則將焉用彼相矣此以瞽者諭也瞽者有相所以持其危扶其顚子曰性相近也習相逺也人之性雖有髙下而實皆善也此之謂相近及其習也則有堯桀之分此之謂相逺子曰惟上知與下愚不移不移者言其稟賦巳定非可強而遷也上知所謂生而知之下愚所謂困而不學矣夫困而不學者雖學不入此知困而不能自反者也知困而不能自反耳目與人同而神識與人異䟽之不通誘之不逹故曰愚也天下之冥冥者是也然而不害於性善者愚智非善惡故也公山弗擾以費畔召子欲往子路不說曰末之也巳何必公山氏之之也子曰夫召我者而豈徒哉如有用我者吾其爲東周乎此釋子路之疑也吾其爲東周乎者言已不爲東周也東周之俗家臣則張私室以逼君陪臣則張公室以逼天子故所不爲也此明雖之公山氏非助其畔好仁不好學其蔽也愚此無仁者之資而慕仁者之操者故絶聖棄智適所以愚子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉此言禮者敬而巳矣非玉帛之謂也玉帛所以飾敬也樂者和而巳矣非鐘鼓之謂也鐘鼓所以飾和也苟敬矣雖畎畝之中禮亦備矣苟和矣雖閑居獨處樂亦備矣子貢曰君子亦有惡乎此君子指孔子也子貢疑孔子道大故問之其下曰賜也亦有惡乎云者孔子反問子貢之言也自惡徼以爲知以下皆子貢答也微子去之箕子爲之奴比干諌而死孔子曰殷有三仁焉三人或死或生其事不同而同謂之仁者明死生不足言仁也夫仁者有成質略舉其大方而言之則不遷怒不貳過不樂生不惡死端而虚靜而一若是者人貌而天其有利害壽夭成敗者是寒暑燥溼春夏秋冬四時之運也故命仁者命以其成質非語其運之變而名之也成質者卞氏之玉也運之變者或刻以爲璽或剖以爲璧也璽與璧則異矣然而稱寳者卞氏之玉也天下有道丘不與易也桀溺本謂孔子皇皇者欲以已易人耳故曰而誰以易之孔子更自謂以天下無道故欲易之耳假令天下有道丘何皇皇求易之乎君子之道孰先傳焉孰後倦焉此言傳道之難也孰有不試而輕以教人乎孰有旣知其可傳而傳之反倦怠乎子夏曰仕而優則學優謂優裕過人也雖曰未學吾必謂之學矣學而優則仕施於有政是亦爲政曽子曰堂堂乎張也難與並爲仁矣仁者遺物忘形無所矜者也爲仁者亦當遺物而忘形無所矜有所矜則有所屈矣子張内修而外矜所以去仁逺不知命無以爲君子也臣事君子事親命也公是先生七經小傳卷下唐寅蔵
