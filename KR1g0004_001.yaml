front:
  text: 公是先生七經小傳卷上
  hash: sha256:cf581f8ac2bef92c3423228be53ddecb7349fee67953186b1dc43e250f652052
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1g0004_SBCK_001-1a}
body:
  text: 尚書堯典曰申命羲叔宅南交説者曰春與夏交非也冬與秋交秋與夏交春與冬交亦何不曰西交北交東交乎且春曰嵎夷曰暘谷秋曰宅西曰昧谷冬曰朔方曰幽都此皆指地而言不當至於夏獨以氣言也本蓋言宅南曰交趾後人傳寫脫兩字故爾非真也春云宅嵎夷秋云宅西推秋之西而知嵎夷為東也夏云宅南冬云宅朔方推夏之南而知朔方為北也此蓋堯舜時四境所至四嶽所統也故舉以言爾舜典曰正月上日受終于文祖輯五瑞者收諸侯圭瑞還之王府既月乃日者既正月之明日謂二月朔耳輯五瑞必俟既月之明日頒之諸侯者以新曆數也修五禮五玉三帛二生一死贄如五器卒乃復如者同也五器者吉凶禮樂及戎器同之一制度也卒乃復者巡守事畢王乃還都也五載一巡守者唐虞氏分天下五服其在畿內甸服之君則皆執事之人也朝夕見焉故不特修朝覲之禮至於侯服當朝一年綏服當朝二年要服當朝三年荒服當朝四年則天下諸侯畢皆一朝一朝則天子巡守故五載一巡守也夔曰於豫擊石拊石百獸率舞益稷之末又有夔曰於豫擊石拊石百獸率舞然則舜典之末衍一簡也何以知之邪方舜之命二十二人莫不讓者惟夔龍為否則亦巳矣又自贊其能夔必不為也且夔於爾時始見命典樂不應遂巳有百獸率舞之事是今日適越而昔至也九共九篇共當作丘古文丘作與共相近故誤傳以為共耳九丘者即所謂八索九丘按小序帝釐下土方設居方別生分類作汨作九共及稿飫然則汨作之篇言所以釐下土興工致治之道尓九丘者乃所謂方設居方別生分類者也九州殊土異俗各因其性順其舊而教擾之故為九篇篇言一州也舜肇十有二州而今但九者幽并之俗與冀州類營州之俗與青州類但疆土廣大故分之耳至於人物自如舊也孔安國為隸古定書不知丘字誤為共遂肆臆説云述職方以除九丘案職方氏之書一官所守耳周禮出於周公仲尼未嘗刪述而云除九丘乎又今職方氏所掌但其地名山川大較豈與方設居方別生分類比乎此云九共當為九丘必也禹貢雖載九州之地形乃是治水之書亦無方設居方別生分類之事則禹貢所言者形質也九丘所言者情性也惜哉此書之亡不及見有虞氏之明德也大禹謨益曰都帝德廣運乃聖乃神乃武乃文皇天眷命奄有四海為天下君禹曰惠迪吉從逆凶惟影響此言帝賞罰之審且速也故能為天下君臯陶謨曰都亦行有九德亦言其人有德此説性善也行有九德者言人之性固有九德也寬柔願亂擾直簡剛強是也亦言其人有德者言性雖有德猶待其人之有德乃成德也栗立恭敬毅溫廉塞義是也願而恭恭與願一物爾願者益恭非德性相濟者也恭當作荼字誤也荼者舒也願慤過者患在不荼故以荼濟願也簡而廉簡者簡易也簡易之人失在無廉隅故濟以廉所謂居敬也彰厥有常吉哉吉猶士也所謂吉士也於九德之中能一德有常則可謂士矣三德可以為卿大夫六德可以為諸侯九德咸事可以王天下然則有常所謂有恆三德所謂善人六德所謂君子九德所謂聖人惟聖人惟能王天下君子可以為諸侯善人可以為卿大夫有恆者可以為士以孔子之徒論之顔淵問為邦子曰行夏之時乘殷之輅服周之冕此王天下之任聖人之德也又曰雍也可使南靣先有司赦小過舉賢材此君一國之任君子之德也又曰由也千乘之國可使治其賦也升堂未入於室此卿大夫之任善人之德也又曰不得中行而與之必也狂狷乎狂者進取狷者有所不為此吉士之任也有恆之德也物之性未有能兼剛柔者也謂聖人備九德然則聖人之性剛且柔乎曰聖人神矣其性無所不備無所不備者或不可得而聞矣不可得而聞則所聞者常聞其接於事為之迹爾臯陶稱舜曰臨下以簡御衆以寬此九德之二也極此言之意故當曰事親以柔行已以願臨事以亂任賢以擾秉德以直斷謀以剛敷政以強此所謂大備之人也益稷曰禹曰弼成五服至于五千州十有二師外薄四海咸建五長各迪有功説者謂禹治水州用三萬人非也師猶長爾一州十二師以啇周之制推之則連率卒正之類也以五長稽之則五國有長而十長有師乎長所以長也師所以師也十長之師凡五十國一州十二師則六百國也州六百國計十二州則七千二百國也十二州之外薄于四海又有五長是以禹會諸侯於塗山執玉帛者萬國也笙鏞以間鳥獸蹌蹌何謂也曰古者制樂皆有所法也或法於鳥或法於獸其聲清揚而短聞者皆法之鳥也其聲宏濁而逺聞者皆法之獸也則此言笙鏞之器各得其法而盡其聲則鳥獸蹌蹌然也擊石拊石百獸率舞何謂也曰聖王功成而作樂樂行而物遂則此言四海之內血氣之類莫不逸豫而自得也人樂極則舞獸不能舞推其樂極則亦冝舞也故謂之率舞也擊石拊石何也曰凡樂厚聲石此言所擊者與所拊者皆厚以和皆泊以恬則能以感人者也禹貢青州萊夷作牧厥篚檿絲徐州淮夷蠙珠暨魚厥篚玄纎縞楊州島夷卉服厥篚織貝豫謂三篚皆三夷之貢也故序於三夷下織讀如士不衣織之織染貝為織島夷所服蓋如厚繒貝者木名耳五百里要服三百里夷二百里蔡五百里荒服三百里蠻二百里流凡唐虞九州州方千里適三千里矣要荒則在九州之外三百里夷者稍以夷禮通之若春秋𣏌鄫葛莒也三百里蠻者亦言雜以蠻俗待之若春秋楚越也二百里蔡者蔡讀如蔡蔡叔之蔡二百里流流讀如流共工之流輕罪則蔡於要服重罪則流于荒服所謂投之四裔屏之逺方者也此則五宅三居之二矣然則其一在綏服九州之內也凡夷性近於人蠻性逺於人故近者稱夷逺者稱蠻也嗣征曰火炎昆岡玉石俱焚天吏逸德烈于猛火殱厥渠魁脅從罔治言火炎則玉石俱焚吏逸則善惡并誅若此則是威烈甚於火矣故不欲如火但殱厥渠魁而巳所以分別玉石湯誓曰伊尹相湯伐桀升自陑陑者桀恃嶮也升之者言其易也著此者言桀雖據險亦不能拒湯所謂地利不如人和孔氏注乃曰出其不意孫吳之師非湯與伊尹之義也伊訓曰惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖元祀者太甲之元年也十有二月者夏正十二月殷正月也舉元祀於上則明十二月者殷正月也不言正月而云十二月者於書未有言王者三統之辨使上下互相備也此先君以去年十二月夏之十一月崩故太甲以今年正月夏之十二月朝廟正君臣至三年十二月則二十六月喪畢而以冕服歸于亳矣若謂十二月亦殷之曆者古天子逾年改元一年不二君則元祀十二月乃太甲改元之後十二月也去先君崩一期矣至三年十二月太甲乃歸于亳歸于亳之時凡居喪三十七月不得為二十六月也欲就二十六月而言之則太甲以先君之末遂為元年乃可爾而非逾年改元一年不二君之義伊尹豈為之哉臣下不匡其刑墨墨者非刑名也謂其刑如墨也貪以敗官為墨今臣不匡君是貪位明矣故使坐貪也傳曰昏墨賊殺臯陶之刑也微子曰父師若曰我舊云刻子王子弗出我乃顚隮刻猶害也言我舊常云紂欲害子今王子不出必見殺王子見殺我乃隕滅矣所以然者三仁存則殷存三仁亡則殷亡武王觀兵還師此其驗也均之不可亡而微子先遜于荒者微子以地逼見疑欲害與其見殺而速亡不如避禍而緩死也然則三人亦何向何背何去何處勢物之變微子以母兄冝避箕子以同姓冝留此仁者之外化內不化也故曰為百丗師泰誓曰惟十有一年武王伐殷孔氏曰觀兵孟津以卜諸侯伐紂之心諸侯僉同乃退以示弱非也詩云匪棘其欲聿追來孝聖人豈有私天下之心哉觀兵孟津者所以憚紂也欲其畏威悔過反善自修也如紂遂能改者武王亦北靣事之而巳矣然則進非示強也退非示弱也進所以警其可畏退所以待其可改及其終不畏終不改然後取之此篇稱紂罔有悛心乃夷居弗事上帝神祇足以知武王之退非示弱而襲之明矣武成曰武王伐殷往伐歸獸識其政事作武成識記也言史官具記武王克啇所施行之政以為此書也然此書簡䇿錯亂兼有亡逸粗次定之于下曰惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐啇此下當次以砥啇之罪告于皇天后土所過名山大川云云下至大賚于四海而萬姓恱服皆在紂都所行之事也然後次以厥四月哉生明王來自啇至于豐然後又次以丁未祀于周廟云云下至豫小子其承厥志此下武王之誥未終當有百工受命之語計脫五六簡矣然後次以乃偃武修文云云然後又次以列爵惟五云云戊午師逾孟津癸亥陳于啇郊甲子俟天休命經文甲子二字在休命下孔氏曰自河至朝歌出四百里五日而至赴敵冝速非也傳曰紂使膠鬲問師期武王告以甲子武王恐失期而膠鬲死於是亟行軍吏曰請少緩武王不可曰膠鬲賢者也吾以此傳雖不見經而以解此經為合夫王者之師正而不竒不乘人以險不掩人以不備者也何以赴敵冝速哉無逸曰此厥不聽人乃訓之又曰此厥不聽人乃或譸張為幻此兩聽字皆當作德字字形相似故誤爾毛詩子夏序詩云禮義廢政教失國異政家殊俗而變風變雅作矣然則諸國風其言正義善事合於道者皆正風也其有刺譏怨諷者乃變風也亦猶二雅言文武成康為正雅言幽厲為變雅矣今説者皆斷周南召南為正風自邶以下為變風遂令淇奧緇衣與南山北門同列非夫子之意子夏之指且國史明乎得失之迹傷人倫之廢哀刑政之苛為變風可矣若人倫不廢刑政不苛何故一本無何字故作顧不得為正風乎既橫生分別不與二雅同又褒貶錯謬實無文可據未足以傳信也葛覃二章曰葛之覃兮施于中谷維葉莫莫是刈是穫為絺為綌服之無斁者葛居谷中莫莫茂盛於是則有人就而刈之穫之以為絺綌而服之不厭如后妃在家德美充茂則王者就聘之以為后妃與之偕老矣卷耳序稱后妃又當輔佐君子求賢審官內有進賢之志至於憂勤吾於此義殊為不曉后妃但主內事所職隂教善不出閨壼之中業不過籩饋之事何得知天下之賢而思進之乎假令實可不害武王豈責紂為牝雞無晨周公作易何言在中饋無攸遂乎假令后妃思念進賢為社稷計亦何至朝夕憂勤乎要之后妃本不與外事自無緣知賢者不肖主名若謂后妃賢當並治其國者是開後丗母后之亂吕武所以亂天下也若爾又何以號為正風教化萬丗乎且令自古婦人欲干預政事故引此詩為證初雖以進賢審官為號巳而晨鳴便無可奈何矣驗大姒大任等亦但治內事無求賢審官之美審知此詩序之誤也蓋后妃於君子有夙夜警戒相成之道此詩言后妃警戒人君使求賢審官之意耳不謂后妃己自求賢審官也事體相類辭意相混故序詩者誤之曰采采卷耳不盈頃筐采卷耳者欲求盈筐今不得盈心不在故無獲也以言為國當求賢耳而賢不至者亦以心不專故賢不來矣如是頃筐無所獲則失其所願周行無所置則失其所治此為后妃警戒求賢審官也其餘又陳當知臣下之勤勞之事亦謂從容警戒於君耳非以后妃己所行也甘棠曰蔽芾甘棠勿翦勿伐召伯所苃蔽芾盛貌召伯在之時嘗憩息此棠樹之下今其人雖不在猶當勿伐此棠蓋覩其物思其人思其人則愛其樹得人心之至也詩人託事指意足以逹其情之深切著明而巳而説者遂謂召公真暴露此樹下使召公為墨子之道也則或有之矣若彼召公者仁人也則有朝廷宫室是乃中庸之法上下之節矣安可非苦就行以干百姓之譽哉非苦就行四字諸本皆爾當考旄丘詩曰何其處也必有與也何其久也必有以也言我所以處且久者正以衛為方伯連率爾怨問之也泉水詩曰我思肥泉兹之永歎出同而歸異曰肥作此詩之女於今衛侯兄弟也以言亦出同而歸異不得相見爾是之為歎也夫人有遣大夫歸寧兄弟禮園有桃其實之殽園之有桃猶國之有君也桃不能自用其實故其實為人之殽猶君不能自用其民反為人有也揚之水白石鑿鑿此興晉人將叛而歸沃之意也激揚之水湍疾騰蹙反令白石鑿鑿然鮮明猶昭公暗弱不修德政反驅百姓歸於沃沃以盛強也非揚之水不能使白石鑿鑿非昭公微弱不能驅百姓歸沃沃以盛強卒章曰我聞有命者道民將叛之實也狼跋曰公孫碩膚赤舄几几公孫者豳公之孫謂周公也周公有碩膚之德故攝政而履人君之舄几几然甚冝之也毛以公孫為成王鄭以公孫為公遜皆非是常棣之四章曰兄弟鬩于牆外禦其侮每有良朋蒸也無戎按此詩八章七章合韻惟此戎字不合韻疑戎當作戍戍亦禦也字既相類傳寫誤也伐木三章章十二句每一章首輒云伐木凡三云伐木故知當三章也今毛氏詩斷六句為一章蓋誤矣伐木丁丁丁丁聲相應也伐木者小事爾猶求同志共事其聲丁丁然以言自天子至庶人亦當須友以相成也彼伐木能求助於人使有聲丁丁然况任天下之事事多重於伐木者乎此乃詩意巳毛鄭説俱非是也有枤之杜有睆其實枤杜特生之杜也以興君子于役則婦人特居焉睆然其實者方其盛時也白駒四章皆興也白駒以斥賢者言若有是白駒食我之埸苗者我則縶維之雖不得久留猶願永終今朝焉愛之厚也以言若有賢者肯食王䘵王則羈縻之雖不得久留猶願永終今朝焉亦愛之厚也二章申殷勤皆所以教王也三章言有皎皎之白馬其潔白可愛猶賁然而來今汝賢者何故自潔白則不肯來乎此以屬賢者故上刺其君之不能下怨賢者之棄吾君忠厚之道也四章皎皎白駒在彼空谷生芻一束其人如玉生芻薄陋也言白駒不見收逸於空谷其養甚薄生芻一束而巳猶賢者不為丗用而甘於菲薄也黃鳥黃鳥無集于榖無啄我粟此邦之人不我肯榖言還言歸復我邦族興也黃鳥集榖啄粟則有彈射捕逐之害猶我嫁于此邦居于此室而遭衰薄之俗有斥逐之辱一人之性不足以變一家一家之俗不足以變一邦而云爾者隂禮不修則舉國皆汙故曰復我邦族也十月之交天命不徹我不敢效我友自逸徹均也小旻四章章八句二章章七句乃得其理今誤為三章八句三章七句卒章曰不敢暴虎不敢馮河人知其一莫知其他此言小人短慮暴虎馮河之患患在目前則知避之喪國亡家之禍禍在歲月故不知憂戰戰兢兢如臨深淵如履薄氷者言善為國者當如此矣小辨曰鹿斯之奔維足伎伎伎伎顧其子也雉之朝雊尚求其雌其雌妃也言王放逐太子曽不如鹿乎廢黜申后曽不如雉乎譬彼瘣木疾用無枝者木瘣則無枝無枝則木死矣亦若王受讒放逐太子自殘其嗣其嗣誠殘王亦且斃踣矣相彼投兔尚或先之者兔為人所驅急更投人人哀其窮則及驅者未至而先存之兔雖可利以其可憐猶存之也何則誠不忍其心之窮急也以言王何獨忍人哉今俗猶言飛鳥入懷勿殺殺之不祥此投兔之比巷伯之詩者孟子所作也孟子仕一作寺人以避嫌不審為讒者譛之至加宫刑為寺人故作此詩也詩名巷伯者是其身所病者故以冠篇末云楊園之道猗于畝丘者言讒人罔極不獨譛已而已必將上及大臣骨肉但先自已始也故曰凡百君子敬而聽之其後王后太子及大夫果多以讒廢者谷風曰習習谷風維山崔嵬無草不死無木不萎忘我大德思我小怨習習之風生草木也崔嵬之山養草木也然而不能使草長不死不能使木長不萎者天地之功有所不足也奈何忘我大德思我小怨乎四月維夏六月徂暑先祖匪人胡寧忍豫此不欲生之辭也我之先祖曽匪以人恩畜我乎何為忍使我當此亂丗而生也滔滔江漢南國之紀盡瘁以仕寧莫我有者江漢之水能紀綱南國諸川而有之今我盡勞從仕王曽不顧有於我計王之德不若江漢之水也匪鶉匪鳶翰飛戾天匪鱣匪鮪潛逃于淵者言怨亂並興憂之之辭也曽不為鶉鳶乎翰飛戾天曽不為鱣鮪乎潛逃于淵言非此四者則皆罹其患矣北山五章章六句故言六章三章六句三章四句非無將大車祇自塵兮無思百憂祇自疷兮博士讀疷為邸非也疷當作痻讀如緍病也字誤耳小明四章章十二句故言五章三章十二句二章六句非鼓鍾詩曰以雅以南文王丗子曰小樂正學干大胥贊之籥師學戈籥師丞贊之胥鼓南此言南者皆指文王樂也則吳季子所觀象簫南籥者也非南夷之樂也南夷之樂曰任不曰南謂之曰南強厥名矣鼓鍾之詩傷幽王亂文武之樂故末及雅與南也雅亦用籥南亦用籥故云以籥不僣也然文王之樂稱象簫南籥者文王之化先被江漢之域故作樂以象其功也象者象南方之譯云信南山曰中田有廬於田中作廬此井田之法也廬舍居內貴人也公田次之先公也私田居外後私也采菽采菽筐之筥之興也菽薄物采以為藿然而不可不敬故或筐之或筥之况諸侯之君乎故當有以厚錫豫之也觱沸檻泉言采其芹采芹者以檻泉潔清則就采其𦵔况諸侯之君有修潔之德乎亦不可不以恩禮接之也假樂故言四章章六句以文理考之實六章章四句卷阿詩曰似先公酋矣召康公則何以不欲成王似先王而獨曰似先公乎曰成王之時周之先王惟有文武文武皆聖人不可似也是以欲成王似其可及者則莫若先公也然則聖人不可及而大賢有可到非不欲其似先王也智不能也以為不然復察於詩召公戒成王則作公劉之詩周公戒成王則作大王之詩所以不及文武者其意皆可知矣常武有常德以立武事因以為戒然常德者既敬既戒惠此南國是也言宣王命太師皇父為冡宰整其六軍既敬矣既戒矣無負於南國矣而南國今不率職故可以征之此謂先自治然後治人故曰常德二章命程伯休父者南國既有變故勑大司馬陳行戒師旅而往討太師皇父為冡宰實總六軍故曰整我六師程伯休父為大司馬專軍政故戒左右陳行也因以為戒者王猶允塞徐方既來徐方不回王曰還歸是也凡兵出則戒於詐故曰王猶允塞乃能來也武成則戒於瀆故曰還歸者止於義也季札聞歌小雅而曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉杜注云衰小也先王殷王也文中子曰季札焉知樂小雅周之盛也豫謂二子之説皆未得其真何者思而不二怨而不言何關殷之末王乎若聞鹿鳴魚麗而謂之衰又何以為季札乎蓋昔者周德既衰樂章錯亂太師非其人不知小雅自有正雅大雅自有變雅而遂誤以凡變雅者為小雅凡正雅者為大雅而季札所聞適皆節南山之類故有周德衰之歎耳後至仲尼自衛反魯乃始分雅頌各得其所由仲尼而雅頌各得其所則仲尼以前大小雅不得其所矣故季札所聞者皆厲宣幽王之詩而當時太師目之為小雅者也此其所以稱怨而不言不亦冝乎七月詩周公作也公劉詩召公作也周公召公等也七月陳王業之本公劉亦云戒以民事美公劉之厚於民其意亦等也周公作之戒成王也召公作之戒成王也戒成王等也七月之興當既王之後公劉之興亦當既王之後其時又等也然而七月則繫豳風公劉則入大雅何也公劉豈非豳國之君七月豈非公劉之詩乎先儒以為周公遭變故七月為變風召公無變故公劉為大雅其然乎其不然乎豳風者名之為豳實周公詩耳周公之詩何不名曰周公國風而曰豳乎周者畿內國也畿內諸侯上繫於王不得國別風也何不編於魯魯者伯禽封耳周公不之魯也何不編之雅與公劉相倫公劉之詩言其政事七月之詩言其風俗既曰風矣不得編於雅矣周公作詩意在於豳而周公之詩無所可繫故因謂之豳也就豳言之七月東山皆正風也鴟梟以下皆變風也由是言之豳七月自無緣入雅不得云周公遭變故為變風也且以七月東山為變風丗復有正風者乎且復有不變風者乎曰然則鴟梟破斧之屬何不列之於雅曰列之於雅是為變雅成王雖始疑周公而終任之攝政六年而後復子明辟君臣之道亦無間矣君子成人之美故不使成王之丗有變雅之聲而攝引其詩使還周公也曰東山之詩非刺也亦何以不入雅曰當此之時成王猶諒暗故兹事不為成王之美亦不入雅明總已之際責在冡宰也與春秋毛伯來求金相似乃知聖人之意六經如合符契耳維清之詩序曰奏象舞也象則文王之樂所謂象簫者蓋文舞也故其辭稱文王之典夫文王之舞謂之象武王之舞謂之武將舞象則先歌維清是以其序曰奏象舞其辭曰文王也將舞武則先歌武是以武之序曰奏大武其辭曰於皇武王也內則十三學舞勺勺大武也十五學舞象象則象簫也教者當舉時王之教學者當舉時王之樂故勺與象明文武之功也雍禘太祖也太祖即后稷矣長發大禘也此禘于宗廟之禘所謂五年再殷祭與祫連稱者也禘于太祖則功臣與祭故末章言伊尹也云昔在中葉者作此詩之時指湯未受命之前為中葉也有震且業者常有震恐危業之事即仲虺云肇我邦于有夏若苗之有莠若粟之有秕小大戰戰罔不懼于非辜者此也公是先生七經小傳卷上
